services:
  bank:
    build: .
    ports:
      - "8000:8000"
    environment:
      - BANK_HOST=0.0.0.0
      - BANK_PORT=8000
      - FIDO_STEPUP_ENABLED=true
      - RP_ID=localhost
      - RP_NAME=FIDO Bank Simulator
      - RP_ORIGIN=http://localhost:8000
      - JWT_SECRET=change-me-in-production
      - JWT_EXPIRY_SECONDS=300
