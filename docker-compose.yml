services:
  bank:
    build: .
    ports:
      - "9090:9090"
    environment:
      - BANK_HOST=0.0.0.0
      - BANK_PORT=9090
      - FIDO_STEPUP_ENABLED=true
      - RP_ID=localhost
      - RP_NAME=FIDO Bank Simulator
      - RP_ORIGIN=http://localhost:9090
      - JWT_SECRET=change-me-in-production
      - JWT_EXPIRY_SECONDS=300
