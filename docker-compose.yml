services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - BANK_HOST=0.0.0.0
      - BANK_PORT=9090
      - FIDO_STEPUP_ENABLED=true
      - RP_ID=localhost
      - RP_NAME=FIDO Bank Simulator
      - RP_ORIGIN=http://localhost
      - JWT_SECRET=change-me-in-production
      - JWT_EXPIRY_SECONDS=300
    expose:
      - "9090"

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
