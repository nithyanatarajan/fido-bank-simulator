<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FIDO Bank</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f5f7fa;
        color: #1a1a2e;
        min-height: 100vh;
      }
      #app {
        max-width: 480px;
        margin: 0 auto;
        padding: 2rem 1rem;
      }
      h1 {
        text-align: center;
        color: #16213e;
        margin-bottom: 2rem;
        font-size: 1.8rem;
      }
      h2 {
        color: #16213e;
        margin-bottom: 1rem;
      }
      .card {
        background: #fff;
        border-radius: 12px;
        padding: 2rem;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        margin-bottom: 1.5rem;
      }
      .tabs {
        display: flex;
        margin-bottom: 1.5rem;
        border-bottom: 2px solid #e8eaed;
      }
      .tab {
        flex: 1;
        padding: 0.75rem;
        text-align: center;
        cursor: pointer;
        border: none;
        background: none;
        font-size: 1rem;
        color: #666;
        border-bottom: 2px solid transparent;
        margin-bottom: -2px;
        transition: all 0.2s;
      }
      .tab.active {
        color: #0f3460;
        border-bottom-color: #0f3460;
        font-weight: 600;
      }
      .form-group {
        margin-bottom: 1rem;
      }
      label {
        display: block;
        margin-bottom: 0.3rem;
        font-weight: 500;
        color: #444;
      }
      input[type='text'],
      input[type='password'] {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 1rem;
        transition: border-color 0.2s;
      }
      input:focus {
        outline: none;
        border-color: #0f3460;
      }
      button {
        padding: 0.75rem 1.5rem;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        cursor: pointer;
        transition: background 0.2s;
      }
      .btn-primary {
        background: #0f3460;
        color: #fff;
        width: 100%;
      }
      .btn-primary:hover {
        background: #16213e;
      }
      .btn-secondary {
        background: #e8eaed;
        color: #333;
      }
      .btn-secondary:hover {
        background: #d1d5db;
      }
      .btn-danger {
        background: #e74c3c;
        color: #fff;
      }
      .btn-danger:hover {
        background: #c0392b;
      }
      .error {
        color: #e74c3c;
        margin-top: 0.5rem;
        font-size: 0.9rem;
      }
      .success {
        color: #27ae60;
        margin-top: 0.5rem;
        font-size: 0.9rem;
      }
      .passkey-list {
        list-style: none;
        padding: 0;
      }
      .passkey-list li {
        padding: 0.75rem;
        background: #f8f9fa;
        border-radius: 8px;
        margin-bottom: 0.5rem;
        font-size: 0.9rem;
      }
      .actions {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
      }
      .actions button {
        flex: 1;
        min-width: 140px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
