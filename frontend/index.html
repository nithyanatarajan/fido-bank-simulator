<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SimpleFIDO Demo Bank</title>
    <style>
      body {
        background: #f8f9fa;
      }
      .navbar-brand {
        font-weight: 700;
        letter-spacing: -0.5px;
      }
      .auth-container {
        max-width: 420px;
        margin: 80px auto;
      }
      .dashboard-container {
        max-width: 720px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      .passkey-item {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .passkey-icon {
        font-size: 1.25rem;
      }
      .step-up-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1050;
      }
      .step-up-card {
        background: #fff;
        border-radius: 12px;
        padding: 2.5rem;
        text-align: center;
        max-width: 400px;
        width: 90%;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="/config.js"></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
