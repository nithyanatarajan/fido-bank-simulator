version: '3'

tasks:
  install:
    desc: Install all dependencies
    cmds:
      - uv sync --all-extras
      - cd frontend && npm install
      - cd tests/e2e && npm install && npx playwright install chromium

  dev:
    desc: Start backend and frontend dev servers
    deps: [backend, client]

  backend:
    desc: Start FastAPI backend
    cmds:
      - uv run uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  client:
    desc: Start Vite frontend dev server
    dir: frontend
    cmds:
      - npm run dev

  build:
    desc: Build frontend for production
    dir: frontend
    cmds:
      - npm run build

  test:
    desc: Run all tests
    cmds:
      - task: test:backend
      - task: test:e2e

  test:backend:
    desc: Run Python backend tests
    cmds:
      - uv run pytest tests/backend/ -v

  test:e2e:
    desc: Run Playwright E2E tests
    dir: tests/e2e
    cmds:
      - npx playwright test

  lint:
    desc: Lint all code
    cmds:
      - task: lint:backend
      - task: lint:frontend

  lint:backend:
    desc: Lint Python code
    cmds:
      - uv run ruff check backend/ tests/backend/

  lint:frontend:
    desc: Lint JavaScript code
    dir: frontend
    cmds:
      - npx eslint src/

  format:
    desc: Format all code
    cmds:
      - task: format:backend
      - task: format:frontend

  format:backend:
    desc: Format Python code
    cmds:
      - uv run ruff format backend/ tests/backend/

  format:frontend:
    desc: Format JavaScript code
    dir: frontend
    cmds:
      - npx prettier --write 'src/**/*.{js,html,css}'

  format:check:
    desc: Check formatting without modifying files
    cmds:
      - uv run ruff format --check backend/ tests/backend/
      - cd frontend && npx prettier --check 'src/**/*.{js,html,css}'
