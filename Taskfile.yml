version: '3'

tasks:
  install:
    desc: Install all dependencies
    cmds:
      - uv sync --all-extras
      - cd frontend && pnpm install
      - cd tests/e2e && pnpm install && pnpm exec playwright install chromium

  dev:
    desc: Start backend and frontend dev servers
    deps: [backend, client]

  backend:
    desc: Start FastAPI backend
    cmds:
      - cd backend && uv run uvicorn app.main:app --host 0.0.0.0 --port 9090 --reload

  client:
    desc: Start Vite frontend dev server
    dir: frontend
    cmds:
      - pnpm dev

  build:
    desc: Build frontend for production
    dir: frontend
    cmds:
      - pnpm build

  test:
    desc: Run all tests
    cmds:
      - task: test:backend
      - task: test:frontend
      - task: test:e2e

  test:backend:
    desc: Run Python backend tests
    cmds:
      - cd backend && uv run pytest tests/ -v

  test:frontend:
    desc: Run frontend unit tests
    dir: frontend
    cmds:
      - pnpm test

  test:e2e:
    desc: Run Playwright E2E tests
    dir: tests/e2e
    cmds:
      - pnpm exec playwright test

  check:
    desc: Check all code (lint + format) without modifying
    cmds:
      - task: check:backend
      - task: check:frontend

  check:backend:
    desc: Check Python code (lint + format)
    cmds:
      - cd backend && uv run ruff check app/ tests/
      - cd backend && uv run ruff format --check app/ tests/

  check:frontend:
    desc: Check JavaScript code (lint + format)
    dir: frontend
    cmds:
      - pnpm run check

  fix:
    desc: Fix all code (lint + format)
    cmds:
      - task: fix:backend
      - task: fix:frontend

  fix:backend:
    desc: Fix Python code (lint + format)
    cmds:
      - cd backend && uv run ruff check --fix app/ tests/
      - cd backend && uv run ruff format app/ tests/

  fix:frontend:
    desc: Fix JavaScript code (lint + format)
    dir: frontend
    cmds:
      - pnpm run fix
