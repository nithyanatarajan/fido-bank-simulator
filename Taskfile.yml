version: '3'

tasks:
  install:
    desc: Install all dependencies
    cmds:
      - uv sync --all-extras
      - cd frontend && pnpm install
      - cd tests/e2e && pnpm install && pnpm exec playwright install chromium

  dev:
    desc: Start backend and frontend dev servers
    deps: [backend, client]

  backend:
    desc: Start FastAPI backend
    cmds:
      - cd backend && uv run uvicorn app.main:app --host 0.0.0.0 --port 9090 --reload

  client:
    desc: Start Vite frontend dev server
    dir: frontend
    cmds:
      - pnpm dev

  build:
    desc: Build frontend for production
    dir: frontend
    cmds:
      - pnpm build

  test:
    desc: Run all tests
    cmds:
      - task: test:backend
      - task: test:frontend
      - task: test:e2e

  test:backend:
    desc: Run Python backend tests
    cmds:
      - cd backend && uv run pytest ../tests/app/ -v

  test:frontend:
    desc: Run frontend unit tests
    dir: frontend
    cmds:
      - pnpm test

  test:e2e:
    desc: Run Playwright E2E tests
    dir: tests/e2e
    cmds:
      - pnpm exec playwright test

  lint:
    desc: Lint all code
    cmds:
      - task: lint:backend
      - task: lint:frontend

  lint:backend:
    desc: Lint Python code
    cmds:
      - cd backend && uv run ruff check app/ ../tests/app/

  lint:frontend:
    desc: Lint JavaScript code
    dir: frontend
    cmds:
      - pnpm exec eslint src/

  format:
    desc: Format all code
    cmds:
      - task: format:backend
      - task: format:frontend

  format:backend:
    desc: Format Python code
    cmds:
      - cd backend && uv run ruff format app/ ../tests/app/

  format:frontend:
    desc: Format JavaScript code
    dir: frontend
    cmds:
      - pnpm exec prettier --write 'src/**/*.{js,html,css}'

  format:check:
    desc: Check formatting without modifying files
    cmds:
      - cd backend && uv run ruff format --check app/ ../tests/app/
      - cd frontend && pnpm exec prettier --check 'src/**/*.{js,html,css}'
